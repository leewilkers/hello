local_backend: true

backend:
  name: github
  repo: leewilkers/hello
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: items
    label: Items
    label_singular: Item
    folder: content/items
    create: true
    extension: md
    format: frontmatter
    slug: "{{fields.author}}-{{fields.title}}"
    identifier_field: author
    summary: "{{fields.author}} – {{fields.title}} [{{fields.dest}}]"
    sortable_fields:
      fields: [author, title, type, dest, date, order]
      default:
        field: author
    view_filters:
      - label: Shelf
        field: dest
        pattern: shelf
      - label: Stream
        field: dest
        pattern: stream
      - label: Books
        field: type
        pattern: book
      - label: Writing
        field: type
        pattern: essay
      - label: Sites
        field: type
        pattern: site
    fields:
      - label: Author
        name: author
        widget: string
      - label: Title
        name: title
        widget: string
        required: false
      - label: Type
        name: type
        widget: select
        options:
          - { label: "Book", value: "book" }
          - { label: "Essay", value: "essay" }
          - { label: "Journal Article", value: "journal article" }
          - { label: "Paper", value: "paper" }
          - { label: "Working Paper", value: "working paper" }
          - { label: "Report", value: "report" }
          - { label: "Site", value: "site" }
          - { label: "Tool", value: "tool" }
          - { label: "Project", value: "project" }
          - { label: "Film", value: "film" }
          - { label: "Interview", value: "interview" }
          - { label: "Slides", value: "slides" }
          - { label: "Concept", value: "concept" }
      - label: Destination
        name: dest
        widget: select
        options:
          - { label: "Shelf", value: "shelf" }
          - { label: "Stream", value: "stream" }
          - { label: "Remove", value: "remove" }
      - label: URL
        name: url
        widget: string
      - label: "Publisher & Year"
        name: dek
        widget: string
        required: false
        hint: "For shelf items. e.g. 'Oxford, 1979' or 'Aeon, 2016'"
      - label: Secondary Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - label: Source
        name: source
        widget: string
        required: false
        hint: "For stream items. e.g. 'ribbonfarm.com'"
      - label: Publish Date
        name: date
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "Original publication date, if known."
      - label: Note
        name: note
        widget: text
        required: false
        hint: "Lee's voice – pitch, quip, personal take. Renders inline on shelf items when present."
      - label: Quote
        name: quote
        widget: text
        required: false
        hint: "Verbatim line from or about the thing. Renders inline on shelf items when present."
      - label: Blurb
        name: blurb
        widget: text
        required: false
        hint: "Source-voiced description – publisher copy, review line, author one-liner. Renders inline on shelf items when present."
      - label: Section
        name: section
        widget: string
        required: false
        hint: "For stream items. Categorizes the article-row. Must match a value in _data/stream_sections.json (leave empty to fall into the default 'links' section)."
      - label: Topic
        name: topic
        widget: select
        required: false
        options:
          - { label: "Architecture & Built Environment", value: "Architecture & Built Environment" }
          - { label: "Classification, Diagrams & Representation", value: "Classification, Diagrams & Representation" }
          - { label: "Design", value: "Design" }
          - { label: "Ecology & Life Sciences", value: "Ecology & Life Sciences" }
          - { label: "Ethics & Moral Philosophy", value: "Ethics & Moral Philosophy" }
          - { label: "Experiences", value: "Experiences" }
          - { label: "Furniture & Craft", value: "Furniture & Craft" }
          - { label: "Games, Play & Performance", value: "Games, Play & Performance" }
          - { label: "Global Health, Aid & Development", value: "Global Health, Aid & Development" }
          - { label: "Infrastructure & Maintenance", value: "Infrastructure & Maintenance" }
          - { label: "Interfaces & Interaction", value: "Interfaces & Interaction" }
          - { label: "Language & Writing", value: "Language & Writing" }
          - { label: "Measurement, Value & Scale", value: "Measurement, Value & Scale" }
          - { label: "Methods, Evidence & Judgement", value: "Methods, Evidence & Judgement" }
          - { label: "Organizations, Institutions & Strategy", value: "Organizations, Institutions & Strategy" }
          - { label: "Potpourri", value: "Potpourri" }
          - { label: "Social Theory", value: "Social Theory" }
          - { label: "Tech Culture", value: "Tech Culture" }
          - { label: "Tech History, STS & Criticism", value: "Tech History, STS & Criticism" }
          - { label: "Technology, general", value: "Technology, general" }
          - { label: "Visual Culture", value: "Visual Culture" }
          - { label: "Web", value: "Web" }
        hint: "For shelf items. Alphabetical topical index."
      - label: Image
        name: image
        widget: image
        required: false
        hint: "Optional accent image (book cover, screenshot)."
      - label: Featured
        name: featured
        widget: boolean
        default: false
        required: false
        hint: "Optional editorial flag for future layout use."
      - label: Display Order
        name: order
        widget: number
        required: false
        hint: "For shelf items. Lower numbers appear first within topic."
