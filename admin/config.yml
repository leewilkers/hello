local_backend: true

backend:
  name: github
  repo: leewilkers/hello
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: items
    label: Items
    label_singular: Item
    folder: content/items
    create: true
    extension: md
    format: frontmatter
    slug: "{{fields.author}}-{{fields.title}}"
    identifier_field: author
    summary: "{{fields.author}} – {{fields.title}} [{{fields.dest}}]"
    sortable_fields:
      fields: [author, title, type, dest, date, order]
      default:
        field: author
    view_filters:
      - label: Shelf
        field: dest
        pattern: shelf
      - label: Stream
        field: dest
        pattern: stream
      - label: Books
        field: type
        pattern: book
      - label: Writing
        field: type
        pattern: essay
      - label: Sites
        field: type
        pattern: site
    fields:
      - label: Author
        name: author
        widget: string
      - label: Title
        name: title
        widget: string
        required: false
      - label: Type
        name: type
        widget: select
        options:
          - { label: "Book", value: "book" }
          - { label: "Essay", value: "essay" }
          - { label: "Journal Article", value: "journal article" }
          - { label: "Paper", value: "paper" }
          - { label: "Working Paper", value: "working paper" }
          - { label: "Report", value: "report" }
          - { label: "Site", value: "site" }
          - { label: "Tool", value: "tool" }
          - { label: "Project", value: "project" }
          - { label: "Game", value: "game" }
          - { label: "Film", value: "film" }
          - { label: "VR", value: "vr" }
          - { label: "Installation", value: "installation" }
          - { label: "Interview", value: "interview" }
          - { label: "Slides", value: "slides" }
          - { label: "Concept", value: "concept" }
      - label: Destination
        name: dest
        widget: select
        options:
          - { label: "Shelf", value: "shelf" }
          - { label: "Stream", value: "stream" }
          - { label: "Remove", value: "remove" }
      - label: URL
        name: url
        widget: string
      - label: "Publisher & Year"
        name: dek
        widget: string
        required: false
        hint: "For shelf items. e.g. 'Oxford, 1979' or 'Aeon, 2016'"
      - label: Secondary Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - label: Source
        name: source
        widget: string
        required: false
        hint: "For stream items. e.g. 'ribbonfarm.com'"
      - label: Publish Date
        name: date
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "Original publication date, if known."
      - label: Note
        name: note
        widget: text
        required: false
        hint: "Lee's voice – pitch, quip, personal take. Renders inline on shelf items when present."
      - label: Quote
        name: quote
        widget: text
        required: false
        hint: "Verbatim line from or about the thing. Renders inline on shelf items when present."
      - label: Blurb
        name: blurb
        widget: text
        required: false
        hint: "Source-voiced description – publisher copy, review line, author one-liner. Renders inline on shelf items when present."
      - label: Section
        name: section
        widget: string
        required: false
        hint: "For stream items. Categorizes the article-row. Must match a value in _data/stream_sections.json (leave empty to fall into the default 'links' section)."
      - label: Topic
        name: topic
        widget: select
        required: false
        options:
          - { label: "Architecture, Infrastructure, & Maintenance", value: "Architecture, Infrastructure, & Maintenance" }
          - { label: "Design", value: "Design" }
          - { label: "Nature & Life", value: "Nature & Life" }
          - { label: "Ethics & Moral Imagination", value: "Ethics & Moral Imagination" }
          - { label: "Experiences", value: "Experiences" }
          - { label: "Fiction", value: "Fiction" }
          - { label: "Furniture & Craft", value: "Furniture & Craft" }
          - { label: "Games, Play & Performance", value: "Games, Play & Performance" }
          - { label: "Global Health, Aid & Development", value: "Global Health, Aid & Development" }
          - { label: "Interfaces & Interaction", value: "Interfaces & Interaction" }
          - { label: "Language & Writing", value: "Language & Writing" }
          - { label: "Data, Evidence, & Epidemiology", value: "Data, Evidence, & Epidemiology" }
          - { label: "Sensemaking & Judgement", value: "Sensemaking & Judgement" }
          - { label: "Social Science & Anthropology", value: "Social Science & Anthropology" }
          - { label: "Strategy & Coordination", value: "Strategy & Coordination" }
          - { label: "Organizations & Work", value: "Organizations & Work" }
          - { label: "Potpourri", value: "Potpourri" }
          - { label: "Bullshit", value: "Bullshit" }
          - { label: "Web Culture & Internet", value: "Web Culture & Internet" }
          - { label: "Technology & Critique", value: "Technology & Critique" }
          - { label: "Outer Space", value: "Outer Space" }
          - { label: "Media", value: "Media" }
          - { label: "Memory & Archives", value: "Memory & Archives" }
          - { label: "Photography & Journalism", value: "Photography & Journalism" }
        hint: "For shelf items. Alphabetical topical index."
      - label: Image
        name: image
        widget: image
        required: false
        hint: "Optional accent image (book cover, screenshot)."
      - label: Featured
        name: featured
        widget: boolean
        default: true
        required: false
        hint: "Legacy field. The shelf review page starts all items as covers; use the page's Move to list button for manual review."
      - label: Shelf list row
        name: shelf_list
        widget: boolean
        default: false
        required: false
        hint: "When true, this shelf item renders as a compact list row instead of a cover card."
      - label: Display Order
        name: order
        widget: number
        required: false
        hint: "For shelf items. Lower numbers appear first within topic."
