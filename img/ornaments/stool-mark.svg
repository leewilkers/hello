<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- medallion: double ring -->
    <circle cx="32" cy="32" r="29.5" stroke-width="1.1"/>
    <circle cx="32" cy="32" r="27" stroke-width="0.9"/>
    <!-- stool top (parallelogram, 3/4 perspective) -->
    <path d="M 17 30 L 45 25 L 50 29 L 22 34 Z" stroke-width="1.3"/>
    <!-- top slab front-edge thickness -->
    <path d="M 22 34 L 22 36.5 L 50 31.5 L 50 29" stroke-width="1.3"/>
    <!-- side edge thickness (left) -->
    <path d="M 17 30 L 17 32.5 L 22 36.5" stroke-width="1.3"/>
    <!-- legs (4, splayed) -->
    <path d="M 21 36 L 18 49" stroke-width="1.3"/>
    <path d="M 33 35.5 L 32 48.5" stroke-width="1.3"/>
    <path d="M 42 33.5 L 43 47" stroke-width="1.3"/>
    <path d="M 49 31.5 L 51 45" stroke-width="1.3"/>
  </g>
  <!-- 3 screws on top -->
  <g fill="currentColor">
    <circle cx="27" cy="30.6" r="0.85"/>
    <circle cx="38" cy="28.7" r="0.85"/>
    <circle cx="45" cy="27.4" r="0.85"/>
  </g>
</svg>
