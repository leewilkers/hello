  .entry-title { font-style: italic; color: #e0e0e0; flex: 1; min-width: 120px; }

    font-size: 0.7rem;
    padding: 0.1rem 0.3rem;

    background: #2a2a2a;
    font-family: inherit;
    flex-shrink: 0;
    text-decoration: none;

  .url-open:hover { color: #c9a227; border-color: #c9a227; }

<div class="app">
  <h1>Shelf Builder</h1>
  <p class="subtitle">Curate the /shelf/ page. Three sections: Books, Essays, Sites. Mark, edit, export.</p>

  <div class="stats">
    <div>Total: <span id="stat-total">0</span></div>
    <div>Keep: <span id="stat-keep">0</span></div>
    <div>Swap: <span id="stat-swap">0</span></div>
    <div>Remove: <span id="stat-remove">0</span></div>
    <div>Unmarked: <span id="stat-unmarked">0</span></div>
    <div>|</div>
    <div>Books: <span id="stat-books">0</span></div>
    <div>Essays: <span id="stat-essays">0</span></div>
    <div>Sites: <span id="stat-sites">0</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="keep">Keep</button>
    <button class="filter-btn" data-filter="swap">Swap</button>
    <button class="filter-btn" data-filter="remove">Remove</button>
    <button class="filter-btn" data-filter="unmarked">Unmarked</button>
  </div>

  <div id="entries"></div>

  <div class="add-section">
    <div class="add-row">
      <input type="text" id="add-author" placeholder="Author">
      <input type="text" id="add-title" placeholder="Title">
      <input type="text" id="add-url" placeholder="URL">
      <select id="add-type"><option value="book">book</option><option value="essay">essay</option><option value="site">site</option></select>
      <button class="add-btn" onclick="addEntry()">Add</button>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="export-btn" onclick="exportNjk()">Copy shelf.njk</button>
    <button class="clear-btn" onclick="exportHTML()">Copy list HTML only</button>
    <span class="export-feedback" id="feedback"></span>
    <div class="spacer"></div>
    <button class="clear-btn" onclick="markAllKeep()">Mark all keep</button>
    <button class="clear-btn" onclick="resetAll()">Reset all</button>
  </div>

  <div class="output-section">
    <div class="output-label">shelf.njk output (keep entries only)</div>
    <div class="output-preview" id="output"></div>
  </div>

  <div class="site-preview-section">
    <div class="output-label">Site preview</div>
    <div class="site-preview" id="site-preview"></div>
  </div>
</div>

const TYPES_ORDER = ['book', 'essay', 'site'];
const TYPE_LABELS = { book: 'Books', essay: 'Essays', site: 'Sites' };

let entries = SEED.map((e, i) => ({
  id: i, author: e.author, title: e.title, type: e.type, url: e.url || "", status: e.status || null, note: "", verified: !!e.verified
}));

let nextId = entries.length;
let currentFilter = 'all';

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const container = document.getElementById('entries');
  const frag = document.createDocumentFragment();

  TYPES_ORDER.forEach(type => {
    const ofType = entries.filter(e => e.type === type);
    const filtered = ofType.filter(e => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'unmarked') return e.status === null;
      return e.status === currentFilter;
    });

    // Section header
    const header = document.createElement('div');
    header.className = 'section-header';
    const keepCount = ofType.filter(e => e.status === 'keep').length;
    header.textContent = TYPE_LABELS[type];
    const countSpan = document.createElement('span');
    countSpan.className = 'section-count';
    countSpan.textContent = '(' + keepCount + ' kept / ' + ofType.length + ' total)';
    header.appendChild(countSpan);
    frag.appendChild(header);

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:0.4rem 0.75rem;color:#555;font-size:0.8rem;font-style:italic;';
      empty.textContent = currentFilter === 'all' ? 'No entries' : 'None matching filter';
      frag.appendChild(empty);
    }

    filtered.forEach(e => {
      const globalIdx = entries.indexOf(e) + 1;
      const div = document.createElement('div');
      div.className = 'entry' + (e.status ? ' status-' + e.status : '');

      const num = document.createElement('div');
      num.className = 'entry-num';
      num.textContent = globalIdx;
      div.appendChild(num);

      const content = document.createElement('div');
      content.className = 'entry-content';

      const textRow = document.createElement('div');
      textRow.className = 'entry-text';

      const authorInput = document.createElement('input');
      authorInput.className = 'entry-author';
      authorInput.value = e.author;
      authorInput.placeholder = 'Author';
      authorInput.addEventListener('input', () => { e.author = authorInput.value; updateOutput(); updateSitePreview(); });
      textRow.appendChild(authorInput);

      if (e.title || e.type !== 'site') {
        const sep = document.createElement('span');
        sep.className = 'entry-sep';
        sep.textContent = '\u2013';
        textRow.appendChild(sep);

        const titleInput = document.createElement('input');
        titleInput.className = 'entry-title';
        titleInput.value = e.title;
        titleInput.placeholder = 'Title';
        titleInput.addEventListener('input', () => { e.title = titleInput.value; updateOutput(); updateSitePreview(); });
        textRow.appendChild(titleInput);
      }

      content.appendChild(textRow);

      const metaRow = document.createElement('div');
      metaRow.className = 'entry-meta';
      const urlInput = document.createElement('input');
      urlInput.className = 'entry-url' + (e.verified ? '' : ' unverified');
      urlInput.value = e.url;
      urlInput.placeholder = 'URL (red = unverified)';
      urlInput.addEventListener('input', () => { e.url = urlInput.value; e.verified = false; updateOutput(); updateSitePreview(); });
      metaRow.appendChild(urlInput);
      if (e.url) {
        const openBtn = document.createElement('a');
        openBtn.className = 'url-open';
        openBtn.href = e.url;
        openBtn.target = '_blank';
        openBtn.rel = 'noopener';
        openBtn.textContent = 'open';
        metaRow.appendChild(openBtn);
      }
      content.appendChild(metaRow);

      // Note field (for Lee → Claude communication, not exported)
      const noteRow = document.createElement('div');
      noteRow.className = 'entry-note';
      const noteInput = document.createElement('input');
      noteInput.value = e.note;
      noteInput.placeholder = 'note for Claude (not exported)';
      noteInput.addEventListener('input', () => { e.note = noteInput.value; });
      noteRow.appendChild(noteInput);
      content.appendChild(noteRow);

      div.appendChild(content);

      const actions = document.createElement('div');
      actions.className = 'entry-actions';
      ['keep', 'swap', 'remove'].forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'action-btn' + (e.status === s ? ' selected-' + s : '');
        btn.textContent = s;
        btn.addEventListener('click', () => { e.status = e.status === s ? null : s; render(); });
        actions.appendChild(btn);
      });
      div.appendChild(actions);

      frag.appendChild(div);
    });
  });

  container.textContent = '';
  container.appendChild(frag);
  updateStats();
  updateOutput();
  updateSitePreview();
}

function addEntry() {
  const author = document.getElementById('add-author').value.trim();
  const title = document.getElementById('add-title').value.trim();
  const url = document.getElementById('add-url').value.trim();
  const type = document.getElementById('add-type').value;
  if (!author && !title) return;
  entries.push({ id: nextId++, author, title, type, url, status: 'keep', note: '', verified: true });
  document.getElementById('add-author').value = '';
  document.getElementById('add-title').value = '';
  document.getElementById('add-url').value = '';
  render();
}

function getKeepByType(type) {
  return entries.filter(e => e.status === 'keep' && e.type === type);
}

function buildEntryHTML(e) {
  const a = esc(e.author);
  const t = esc(e.title);
  if (e.url) {
    if (e.title) return '  <li><a href="' + esc(e.url) + '">' + a + ' \u2013 <em>' + t + '</em></a></li>';
    return '  <li><a href="' + esc(e.url) + '">' + a + '</a></li>';
  }
  if (e.title) return '  <li>' + a + ' \u2013 <em>' + t + '</em></li>';
  return '  <li>' + a + '</li>';
}

function buildFullNjk() {
  let out = '---\nlayout: base.njk\ntitle: Shelf \u2013 Lee Wilkers\npermalink: /shelf/\n---\n\n<p>Shelf</p>\n';
  TYPES_ORDER.forEach(type => {
    const kept = getKeepByType(type);
    if (kept.length === 0) return;
    out += '\n<p>' + TYPE_LABELS[type] + '</p>\n<ul class="shelf">\n';
    out += kept.map(buildEntryHTML).join('\n');
    out += '\n</ul>\n';
  });
  return out;
}

function buildListHTML() {
  let out = '';
  TYPES_ORDER.forEach(type => {
    const kept = getKeepByType(type);
    if (kept.length === 0) return;
    out += '<p>' + TYPE_LABELS[type] + '</p>\n<ul class="shelf">\n';
    out += kept.map(buildEntryHTML).join('\n');
    out += '\n</ul>\n\n';
  });
  return out.trim();
}

function updateOutput() {
  document.getElementById('output').textContent = buildFullNjk();
}

function updateSitePreview() {
  const container = document.getElementById('site-preview');
  container.textContent = '';

  const title = document.createElement('p');
  title.textContent = 'Shelf';
  container.appendChild(title);

  let hasAny = false;
  TYPES_ORDER.forEach(type => {
    const kept = getKeepByType(type);
    if (kept.length === 0) return;
    hasAny = true;

    const label = document.createElement('p');
    label.textContent = TYPE_LABELS[type];
    container.appendChild(label);

    const ul = document.createElement('ul');
    kept.forEach(e => {
      const li = document.createElement('li');
      if (e.url) {
        const a = document.createElement('a');
        a.href = e.url;
        a.target = '_blank';
        a.rel = 'noopener';
        if (e.title) {
          a.appendChild(document.createTextNode(e.author + ' \u2013 '));
          const em = document.createElement('em');
          em.textContent = e.title;
          a.appendChild(em);
        } else {
          a.textContent = e.author;
        }
        li.appendChild(a);
      } else {
        if (e.title) {
          li.appendChild(document.createTextNode(e.author + ' \u2013 '));
          const em = document.createElement('em');
          em.textContent = e.title;
          li.appendChild(em);
        } else {
          li.textContent = e.author;
        }
      }
      ul.appendChild(li);
    });
    container.appendChild(ul);
  });

  if (!hasAny) {
    const msg = document.createElement('p');
    msg.style.cssText = 'color:#999;font-style:italic';
    msg.textContent = 'No entries marked keep yet';
    container.appendChild(msg);
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = entries.length;
  document.getElementById('stat-keep').textContent = entries.filter(e => e.status === 'keep').length;
  document.getElementById('stat-swap').textContent = entries.filter(e => e.status === 'swap').length;
  document.getElementById('stat-remove').textContent = entries.filter(e => e.status === 'remove').length;
  document.getElementById('stat-unmarked').textContent = entries.filter(e => e.status === null).length;
  document.getElementById('stat-books').textContent = entries.filter(e => e.type === 'book' && e.status === 'keep').length;
  document.getElementById('stat-essays').textContent = entries.filter(e => e.type === 'essay' && e.status === 'keep').length;
  document.getElementById('stat-sites').textContent = entries.filter(e => e.type === 'site' && e.status === 'keep').length;
}

function exportHTML() {
  navigator.clipboard.writeText(buildListHTML()).then(() => showFeedback('List HTML copied'));
}

function exportNjk() {
  navigator.clipboard.writeText(buildFullNjk()).then(() => showFeedback('Full shelf.njk copied'));
}

function showFeedback(msg) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function markAllKeep() {
  entries.forEach(e => { if (e.status === null) e.status = 'keep'; });
  render();
}

function resetAll() {
  entries.forEach(e => { e.status = null; });
  render();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('add-url').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
document.getElementById('add-title').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-url').focus(); });
document.getElementById('add-author').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-title').focus(); });

render();
</script>

</body>
</html>
